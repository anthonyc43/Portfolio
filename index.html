<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthony Cerulli Jr - Portfolio</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
  font-size: 20px;
  line-height: 1.6;
}

body {
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  color: #ffffff;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #ffffff;
  padding: 60px 20px 40px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  border-bottom: 4px solid #764ba2;
}

.header h1 {
  font-size: 3.5em;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  margin-bottom: 10px;
}

.header-subtitle {
  font-size: 1.3em;
  font-weight: 300;
  letter-spacing: 0.3px;
  opacity: 0.95;
  margin-top: 8px;
}

.intro-section {
  max-width: 900px;
  margin: 50px auto;
  padding: 30px 20px;
  text-align: center;
  font-size: 1.1em;
  line-height: 1.8;
  color: #e0e0e0;
}

.menu {
  list-style-type: none;
  margin: 50px auto;
  padding: 0;
  width: 100%;
  max-width: 1000px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 0 20px;
}

.menu li {
  margin: 0;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
  border: 2px solid rgba(102, 126, 234, 0.4);
  border-radius: 12px;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  overflow: hidden;
}

.menu li:hover {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
  border-color: #a9c5ff;
  transform: translateY(-8px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

.menu li a {
  display: block;
  padding: 28px 20px;
  color: #ffffff;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.3em;
  transition: all 0.3s ease;
  text-align: center;
}

.menu li:hover a {
  color: #a9c5ff;
  letter-spacing: 0.5px;
}

.row::after {
  content: "";
  clear: both;
  display: table;
}

[class*="col-"] {
  float: left;
  padding: 15px;
}

/* For mobile phones: */
[class*="col-"] {
  width: 100%;
}

@media only screen and (min-width: 600px) {
  .col-s-1 {width: 8.33%;}
  .col-s-2 {width: 16.66%;}
  .col-s-3 {width: 25%;}
  .col-s-4 {width: 33.33%;}
  .col-s-5 {width: 41.66%;}
  .col-s-6 {width: 50%;}
  .col-s-7 {width: 58.33%;}
  .col-s-8 {width: 66.66%;}
  .col-s-9 {width: 75%;}
  .col-s-10 {width: 83.33%;}
  .col-s-11 {width: 91.66%;}
  .col-s-12 {width: 100%;}
}

@media only screen and (min-width: 768px) {
  .col-1 {width: 8.33%;}
  .col-2 {width: 16.66%;}
  .col-3 {width: 25%;}
  .col-4 {width: 33.33%;}
  .col-5 {width: 41.66%;}
  .col-6 {width: 50%;}
  .col-7 {width: 58.33%;}
  .col-8 {width: 66.66%;}
  .col-9 {width: 75%;}
  .col-10 {width: 83.33%;}
  .col-11 {width: 91.66%;}
  .col-12 {width: 100%;}
}

h1 {
  text-align: center;
}

a {
  color: #a9c5ff;
  transition: color 0.3s ease;
}

a:hover {
  color: #667eea;
}

.footer {
  text-align: center;
  padding: 40px 20px;
  margin-top: 60px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  color: #a9c5ff;
  font-size: 0.95em;
}

@media only screen and (max-width: 600px) {
  .menu {
    grid-template-columns: 1fr;
  }
  
  .header h1 {
    font-size: 2.5em;
  }
  
  .header-subtitle {
    font-size: 1.1em;
  }
}
</style>
</head>
<body>

  <h1>Anthony Cerulli Jr</h1>
  <div class="header-subtitle">Sound Designer & Concept Artist</div>
</div>

<div class="intro-section">
  <p>Welcome to my portfolio. Explore my work in music production, and visual art.</p>
</div>

      <li><a href="resume.html">Resume</a></li>
      <li><a href="contactinfo.html">Contact</a></li>
    </ul>
  </div>
  </div>
</div>



</body>
</html>
